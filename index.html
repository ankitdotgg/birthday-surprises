<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Story in Stars</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
      cursor: default;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Intro overlay */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 2s ease;
    }

    #intro-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .intro-photo-wrap {
      position: relative;
      width: clamp(130px, 28vw, 180px);
      height: clamp(130px, 28vw, 180px);
      opacity: 0;
      animation: fadeUp 2.5s ease 0.3s forwards;
      margin-bottom: 1.8rem;
    }

    .intro-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      border-radius: 50%;
      border: 2px solid rgba(255, 200, 150, 0.15);
    }

    .intro-photo-glow {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,180,150,0.12) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .intro-photo-stars {
      position: absolute;
      inset: -20px;
    }

    .float-star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 220, 180, 0.7);
      border-radius: 50%;
      font-size: 0;
      animation: floatStar 3s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(255, 200, 130, 0.5);
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes floatStar {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
      50% { transform: translateY(-6px) scale(1.3); opacity: 1; }
    }

    #intro-overlay .intro-hindi {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.4rem, 4.5vw, 2.8rem);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 2s ease 1.5s forwards;
      color: rgba(255, 220, 180, 0.95);
    }

    #intro-overlay .intro-sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.8rem, 2.5vw, 1.15rem);
      letter-spacing: 0.08em;
      opacity: 0;
      margin-top: 0.6rem;
      color: rgba(255, 255, 255, 0.45);
      animation: fadeUp 2s ease 2.5s forwards;
    }

    #intro-overlay .intro-birthday {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      letter-spacing: 0.12em;
      opacity: 0;
      margin-top: 2rem;
      color: rgba(255, 180, 200, 0.85);
      animation: fadeUp 2s ease 3.5s forwards;
    }

    #intro-overlay .intro-from {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.15em;
      opacity: 0;
      margin-top: 0.4rem;
      color: rgba(255, 255, 255, 0.3);
      animation: fadeUp 1.5s ease 4.5s forwards;
    }

    #enter-btn {
      margin-top: 2.5rem;
      padding: 0.8rem 2.5rem;
      background: transparent;
      border: 1px solid rgba(255, 200, 150, 0.25);
      color: rgba(255, 220, 180, 0.8);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 2s ease 5.5s forwards;
      transition: all 0.4s ease;
    }

    #enter-btn:hover {
      background: rgba(255, 200, 150, 0.08);
      border-color: rgba(255, 200, 150, 0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Memory popup */
    #memory-popup {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #memory-popup.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #memory-popup .card {
      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
      max-width: 320px;
      min-width: 260px;
    }

    #memory-popup .card .memory-image-wrap {
      width: 100%;
      max-height: 220px;
      overflow: hidden;
    }

    #memory-popup .card .memory-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #memory-popup .card .memory-image.loaded {
      opacity: 1;
    }

    #memory-popup .card .date {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 200, 150, 0.7);
      margin: 1rem 1.4rem 0.4rem;
    }

    #memory-popup .card .memory-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.9);
      padding: 0 1.4rem 1.4rem;
    }

    /* Close button for popup */
    #memory-popup .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.2rem;
      cursor: pointer;
      pointer-events: auto;
    }

    /* Hint text */
    #hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    #hint.visible {
      opacity: 1;
    }

    /* Star label on hover */
    #star-label {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-style: italic;
      color: rgba(255, 220, 180, 0.8);
      text-shadow: 0 0 10px rgba(255, 200, 100, 0.3);
    }

    #star-label.visible {
      opacity: 1;
    }

    /* Birthday message at the bottom */
    #birthday-msg {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3vw, 1.6rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(255, 255, 255, 0);
      text-align: center;
      transition: color 3s ease;
      white-space: nowrap;
    }

    #birthday-msg.visible {
      color: rgba(255, 255, 255, 0.35);
    }

    /* Music controls */
    #music-toggle {
      position: fixed;
      bottom: 1.2rem;
      right: 1.5rem;
      z-index: 60;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1s ease, background 0.3s ease;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1rem;
    }

    #music-toggle.visible { opacity: 1; }
    #music-toggle:hover { background: rgba(255, 255, 255, 0.12); }

    #music-toggle .bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    #music-toggle .bar {
      width: 3px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 1px;
      animation: musicBar 0.8s ease-in-out infinite alternate;
    }

    #music-toggle .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    #music-toggle .bar:nth-child(2) { height: 10px; animation-delay: 0.2s; }
    #music-toggle .bar:nth-child(3) { height: 4px; animation-delay: 0.4s; }
    #music-toggle .bar:nth-child(4) { height: 8px; animation-delay: 0.1s; }

    #music-toggle.paused .bar { animation: none; height: 3px; }

    @keyframes musicBar {
      from { height: 3px; }
      to { height: 14px; }
    }

    /* Comet message */
    #comet-message {
      position: fixed;
      z-index: 55;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #comet-message.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #comet-message .comet-card {
      background: rgba(10, 10, 40, 0.92);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 200, 100, 0.15);
      border-radius: 16px;
      padding: 2rem 2.2rem;
      max-width: 380px;
      min-width: 280px;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 180, 80, 0.08), 0 0 80px rgba(100, 120, 255, 0.05);
    }

    #comet-message .comet-card .friend-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 200, 130, 0.8);
      margin-bottom: 0.3rem;
    }

    #comet-message .comet-card .friend-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 1rem;
    }

    #comet-message .comet-card .friend-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.9);
      font-style: italic;
    }

    #comet-message .comet-card .comet-close {
      margin-top: 1.2rem;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #comet-message .comet-card .comet-close:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: rgba(255, 255, 255, 0.7);
    }

    /* Song credit */
    #song-credit {
      position: fixed;
      bottom: 1.4rem;
      right: 4.5rem;
      z-index: 60;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity 1.5s ease;
      font-style: italic;
    }

    #song-credit.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="intro-overlay">
    <div class="intro-photo-wrap">
      <div class="intro-photo-glow"></div>
      <img src="/photos/01.jpeg" alt="Her" class="intro-photo" />
      <div class="intro-photo-stars">
        <span class="float-star" style="top:5%;left:10%;animation-delay:0s">.</span>
        <span class="float-star" style="top:15%;right:8%;animation-delay:0.5s">.</span>
        <span class="float-star" style="bottom:20%;left:5%;animation-delay:1s">.</span>
        <span class="float-star" style="bottom:10%;right:12%;animation-delay:1.5s">.</span>
        <span class="float-star" style="top:40%;left:2%;animation-delay:0.8s">.</span>
        <span class="float-star" style="top:30%;right:3%;animation-delay:1.2s">.</span>
      </div>
    </div>
    <h1 class="intro-hindi">Every star holds a memory of us</h1>
    <p class="intro-sub">A universe built from our moments together</p>
    <p class="intro-birthday">Happy Birthday</p>
    <p class="intro-from">— with all my love</p>
    <button id="enter-btn">Enter Our Sky</button>
  </div>

  <div id="canvas-container"></div>

  <div id="memory-popup">
    <div class="card">
      <button class="close-btn">&times;</button>
      <div class="memory-image-wrap">
        <img class="memory-image" src="" alt="" />
      </div>
      <div class="date"></div>
      <div class="memory-text"></div>
    </div>
  </div>

  <div id="comet-message">
    <div class="comet-card">
      <div class="friend-name"></div>
      <div class="friend-label">sent a wish via the stars</div>
      <div class="friend-text"></div>
      <button class="comet-close">continue</button>
    </div>
  </div>

  <div id="star-label"></div>
  <div id="hint">click a glowing star to reveal a memory</div>
  <div id="birthday-msg">Happy Birthday</div>

  <button id="music-toggle" title="Toggle music">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </button>
  <div id="song-credit">Your Song Here</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
